name: Update DLSS List

on:
  schedule:
    - cron: "36 22 * * 3" # Every Wednesday ~6:36 PM ET (10:36 PM UTC)
    - cron: "36 22 * * 5" # Every Friday ~6:36 PM ET (10:36 PM UTC)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Update DLSS list and game data
        run: node scripts/update.js

      - name: Validate JSON output
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/game_data.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('public/dlss-rt-games-apps-overrides.json', 'utf8'))"

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dlss-rt-games-apps-overrides.json public/game_data.json
          git commit -m "chore: update DLSS game data ($(date +%Y-%m-%d))"
          git push
